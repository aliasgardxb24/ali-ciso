<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visiontech MSSP — Password Protected</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0c2340 0%, #1d4f7c 100%);
  }
  .login-container {
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo { font-size: 40px; margin-bottom: 1rem; }
  h1 { color: #0c2340; margin-bottom: 0.5rem; font-size: 24px; }
  .subtitle { color: #7a8fa6; margin-bottom: 2rem; font-size: 13px; }
  .form-group {
    margin-bottom: 1.5rem;
    text-align: left;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    color: #0c2340;
    font-weight: 600;
    font-size: 13px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #dde3ed;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Segoe UI', sans-serif;
    transition: all 0.3s;
  }
  input:focus {
    outline: none;
    border-color: #0057ff;
    box-shadow: 0 0 0 3px rgba(0, 87, 255, 0.1);
  }
  button {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, #0057ff, #003dbf);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 1rem;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 87, 255, 0.35); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { color: #c0392b; font-size: 12px; margin-top: 0.5rem; display: none; }
  .success { color: #00875a; font-size: 12px; margin-top: 0.5rem; display: none; }
  .footer { color: #7a8fa6; font-size: 11px; margin-top: 1.5rem; }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">🔐</div>
  <h1>Visiontech MSSP</h1>
  <p class="subtitle">Confidential Sales Report — Jan–Apr 2026</p>
  
  <form onsubmit="checkPassword(event)">
    <div class="form-group">
      <label for="pwd">Enter Password:</label>
      <input type="password" id="pwd" placeholder="Enter access password" required autofocus>
    </div>
    <button type="submit">Unlock Report</button>
    <div class="error" id="error">❌ Incorrect password. Try again.</div>
  </form>
  
  <div class="footer">
    Confidential — Visiontech UAE MSSP Business Unit<br>
    For authorized access only
  </div>
</div>

<script>
  const CORRECT_PASSWORD = 'vision123'; // 🔄 CHANGE THIS TO YOUR DESIRED PASSWORD
  
  function checkPassword(e) {
    e.preventDefault();
    const pwd = document.getElementById('pwd').value;
    const errorDiv = document.getElementById('error');
    
    if (pwd === CORRECT_PASSWORD) {
      localStorage.setItem('visiontech_authenticated', 'true');
      window.location.href = '#report';
      location.reload();
    } else {
      errorDiv.style.display = 'block';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }
  
  // Check if already authenticated
  if (localStorage.getItem('visiontech_authenticated') === 'true') {
    document.body.innerHTML = '<iframe id="report-frame" style="width:100vw;height:100vh;border:none;margin:0;padding:0" src="data:text/html;base64,' + btoa(document.documentElement.innerHTML) + '"></iframe>';
  }
</script>

<!-- ACTUAL REPORT CONTENT (Hidden by default) -->
<div style="display: none;" id="report-content">
